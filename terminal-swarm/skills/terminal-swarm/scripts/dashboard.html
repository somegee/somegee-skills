<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Terminal Swarm</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23d97706'/><text x='32' y='44' text-anchor='middle' font-family='monospace' font-weight='bold' font-size='32' fill='white'>＞_</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/ayu-dark.min.css">
  <style id="cm-swarm-theme">
    .cm-s-swarm.CodeMirror { background: var(--bg); color: var(--t1); }
    .cm-s-swarm .CodeMirror-gutters { background: var(--bg2); border-right: 1px solid var(--bd); }
    .cm-s-swarm .CodeMirror-linenumber { color: var(--tm); }
    .cm-s-swarm .CodeMirror-cursor { border-left-color: var(--ac); }
    .cm-s-swarm div.CodeMirror-selected { background: var(--bga); }
    .cm-s-swarm .CodeMirror-activeline-background { background: var(--bg3); }
    .cm-s-swarm .CodeMirror-matchingbracket { color: var(--ac) !important; text-decoration: underline; }
    .cm-s-swarm .cm-keyword { color: var(--ac); }
    .cm-s-swarm .cm-def { color: var(--t1); font-weight: 600; }
    .cm-s-swarm .cm-variable { color: var(--t1); }
    .cm-s-swarm .cm-variable-2 { color: var(--ach); }
    .cm-s-swarm .cm-string { color: var(--gn); }
    .cm-s-swarm .cm-string-2 { color: var(--gn); }
    .cm-s-swarm .cm-number { color: var(--rd); }
    .cm-s-swarm .cm-atom { color: var(--rd); }
    .cm-s-swarm .cm-comment { color: var(--tm); font-style: italic; }
    .cm-s-swarm .cm-property { color: var(--t1); }
    .cm-s-swarm .cm-attribute { color: var(--ac); }
    .cm-s-swarm .cm-tag { color: var(--rd); }
    .cm-s-swarm .cm-builtin { color: var(--ach); }
    .cm-s-swarm .cm-operator { color: var(--t2); }
    .cm-s-swarm .cm-meta { color: var(--tm); }
    .cm-s-swarm .cm-type { color: var(--ach); }
    .cm-s-swarm .cm-searching { background: rgba(255, 200, 0, .3); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/search/searchcursor.min.js"></script>

      --bd: #2a2a48;
      --t1: #f0f0ff;
      --t2: #b0b0d0;
      --tm: #8080a0;
      --ac: #ff6b6b;
      --ach: #ff8e8e;
      --gn: #6bff6b;
      --rd: #ff6b6b;
      --sh: rgba(200,210,220,.35);
      animation: rainbow-shift 1.5s linear infinite
    }

    @keyframes rainbow-shift {
      0% {
        filter: hue-rotate(0deg)
      }

      100% {
        filter: hue-rotate(360deg)
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bd);
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: padding-box
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--tm);
      border: 2px solid transparent;
      background-clip: padding-box
    }

    ::-webkit-scrollbar-corner {
      background: transparent
    }

    .xterm-viewport::-webkit-scrollbar {
      width: 6px
    }

    .xterm-viewport::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .15);
      border-radius: 3px;
      border: 0
    }

    .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, .3)
    }

    @font-face {
      font-family: 'LaundryGothic';
      src: url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Lifegoeson/TTLaundryGothicR.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'LaundryGothic';
      src: url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Lifegoeson/TTLaundryGothicB.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    body {
      font-family: 'LaundryGothic', -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--t1);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none
    }

    .hd {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px 0 0;
      height: 36px;
      background: var(--bg2);
      border-bottom: 1px solid var(--bd)
    }

    .hd .logo {
      width: 220px;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--ac);
      letter-spacing: 1px;
      text-transform: uppercase;
      border-right: 1px solid var(--bd);
      padding: 0 12px 0 16px;
      box-sizing: border-box
    }

    .hd .bn {
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      background: var(--ac);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      cursor: pointer
    }

    .hd .credit {
      font-size: 10px;
      color: var(--tm);
      letter-spacing: .3px
    }

    /* Theme switcher */
    .theme-dd-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid var(--bd);
      flex-shrink: 0
    }

    .ui-theme-card {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--bd);
      background: var(--bg3);
      cursor: pointer;
      font-size: 12px;
      color: var(--t2);
      transition: all .15s
    }

    .ui-theme-card:hover {
      background: var(--bgh);
      color: var(--t1);
      border-color: var(--t2)
    }

    .ui-theme-card.active {
      border-color: var(--ac);
      color: var(--ac);
      font-weight: 600
    }

    .ui-font-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--bd);
      background: var(--bg3);
      cursor: pointer;
      font-size: 13px;
      color: var(--t2);
      transition: all .15s
    }

    .ui-font-item:hover {
      background: var(--bgh);
      color: var(--t1);
      border-color: var(--t2)
    }

    .ui-font-item.active {
      border-color: var(--ac);
      color: var(--ac);
      font-weight: 600
    }

    .font-help-trigger {
      position: relative
    }

    .font-help-tooltip {
      display: none;
      position: absolute;
      left: 50%;
      top: calc(100% + 8px);
      transform: translateX(-50%);
      width: 220px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--bg2);
      border: 1px solid var(--bd);
      color: var(--t1);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.5;
      text-transform: none;
      letter-spacing: 0;
      white-space: normal;
      z-index: 300;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .3);
      pointer-events: none
    }

    .font-help-tooltip::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -5px;
      transform: translateX(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background: var(--bg2);
      border-left: 1px solid var(--bd);
      border-top: 1px solid var(--bd)
    }

    .font-help-trigger:hover .font-help-tooltip {
      display: block
    }

    /* Help / Tour */
    .help-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--bd);
      background: var(--bg3);
      color: var(--tm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px
    }

    .help-btn:hover {
      background: var(--ac);
      color: var(--bg);
      border-color: var(--ac)
    }

    .tour-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      pointer-events: none;
      display: none
    }

    .tour-overlay.show {
      display: block
    }

    .tour-overlay .tour-bg {
      position: fixed;
      inset: 0;
      pointer-events: auto
    }

    .tour-spot {
      position: fixed;
      z-index: 301;
      border-radius: 6px;
      box-shadow: 0 0 0 4000px rgba(0, 0, 0, .7);
      pointer-events: none;
      transition: all .35s ease
    }

    .tour-tip {
      position: fixed;
      z-index: 302;
      background: var(--bg2);
      border: 1px solid var(--ac);
      border-radius: 10px;
      padding: 18px 20px;
      max-width: 360px;
      pointer-events: auto;
      transition: all .35s ease
    }

    .tour-tip h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--ac);
      margin-bottom: 8px
    }

    .tour-tip p {
      font-size: 13px;
      color: var(--t1);
      line-height: 1.6;
      margin-bottom: 12px
    }

    .tour-tip .tour-nav {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .tour-tip .tour-dots {
      display: flex;
      gap: 5px
    }

    .tour-tip .tour-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--bd)
    }

    .tour-tip .tour-dot.active {
      background: var(--ac)
    }

    .tour-tip .tour-btns {
      display: flex;
      gap: 6px
    }

    .tour-tip .tbtn {
      padding: 5px 14px;
      border-radius: 5px;
      border: 1px solid var(--bd);
      background: var(--bg3);
      color: var(--t1);
      font-size: 12px;
      cursor: pointer
    }

    .tour-tip .tbtn:hover {
      background: var(--bgh)
    }

    .tour-tip .tbtn-ok {
      background: var(--ac);
      color: var(--bg);
      border-color: var(--ac);
      font-weight: 600
    }

    .tour-tip .tbtn-ok:hover {
      background: var(--ach)
    }

    .tour-tip .tour-keys {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg3);
      border: 1px solid var(--bd);
      font-size: 11px;
      font-family: monospace;
      color: var(--t2)
    }

    .mn {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    .sb {
      width: 220px;
      height: 100%;
      max-height: 100%;
      background: var(--bg2);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden
    }

    .sb-t {
      padding: 10px 14px 6px;
      font-size: 11px;
      color: var(--tm);
      text-transform: uppercase;
      letter-spacing: .8px
    }

    .sl {
      flex: 1;
      overflow-y: auto;
      min-height: 60px
    }

    .si {
      display: flex;
      align-items: center;
      gap: 4px 8px;
      padding: 7px 14px;
      cursor: grab;
      border-left: 2px solid transparent
    }

    .si:hover {
      background: var(--bgh)
    }

    .si:active {
      cursor: grabbing
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .dot.on {
      background: var(--gn);
      box-shadow: 0 0 4px var(--gn)
    }

    .dot.off {
      background: var(--tm)
    }

    .dot.pulse {
      animation: dot-pulse 1.2s ease-in-out infinite
    }

    .dot.needs-input {
      background: var(--yl, #e6b450);
      box-shadow: 0 0 6px var(--yl, #e6b450);
      animation: dot-blink .6s ease-in-out infinite
    }

    .dot.ready {
      background: #38bdf8;
      box-shadow: 0 0 8px #38bdf8;
      animation: dot-pulse-blue 1.5s ease-in-out infinite
    }

    .dot.active {
      background: var(--gn);
      box-shadow: 0 0 6px var(--gn);
      animation: dot-blink-green .8s ease-in-out infinite
    }

    @keyframes dot-blink-green {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--gn) }
      50% { opacity: .3; box-shadow: 0 0 10px var(--gn) }
    }

    @keyframes dot-pulse-blue {
      0%, 100% { box-shadow: 0 0 6px #38bdf8 }
      50% { box-shadow: 0 0 16px #38bdf8, 0 0 28px #38bdf8 }
    }

    @keyframes dot-pulse {
      0%, 100% {
        background: var(--gn);
        box-shadow: 0 0 3px var(--gn);
        opacity: 0.4;
        transform: scale(0.85)
      }
      50% {
        background: var(--gn);
        box-shadow: 0 0 10px var(--gn), 0 0 20px var(--gn);
        opacity: 1;
        transform: scale(1.15)
      }
    }

    @keyframes dot-blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .si-info {
      flex: 1;
      min-width: 0
    }

    .sn {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .sc {
      font-size: 11px;
      color: var(--tm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .si-btns {
      display: none;
      gap: 2px;
      align-items: center;
      margin-left: auto;
      flex-shrink: 0
    }

    .si:hover .si-btns {
      display: flex
    }

    .sk {
      background: none;
      border: 1px solid var(--bd);
      color: var(--tm);
      font-size: 11px;
      padding: 2px 5px;
      border-radius: 3px;
      cursor: pointer;
      transition: all .15s;
      line-height: 1
    }

    .sk:hover {
      background: var(--bgh);
      color: var(--t1);
      border-color: var(--t2)
    }

    .sk-star {
      color: var(--yl, #e6b450);
      border-color: var(--yl, #e6b450)
    }

    .sk-star:hover {
      background: var(--yl, #e6b450);
      color: var(--bg)
    }

    .sk-rename {
      color: var(--ac);
      border-color: var(--ac)
    }

    .sk-rename:hover {
      background: var(--ac);
      color: var(--bg)
    }

    .sk-kill {
      color: var(--rd);
      border-color: var(--rd)
    }

    .sk-kill:hover {
      background: var(--rd);
      color: #fff
    }

    /* New terminal menu */
    .new-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 100%;
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 4px;
      min-width: 140px;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .4)
    }

    .new-menu.show {
      display: block
    }

    .new-menu-item {
      padding: 6px 12px;
      font-size: 12px;
      color: var(--t1);
      cursor: pointer;
      white-space: nowrap
    }

    .new-menu-item:hover {
      background: var(--bgh)
    }

    .new-menu-item:first-child {
      border-radius: 4px 4px 0 0
    }

    .new-menu-item:last-child {
      border-radius: 0 0 4px 4px
    }

    /* Favorites */
    /* Files drop zone + list */
    .files-area {
      border-top: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      flex: 2;
      min-height: 150px;
      overflow: hidden
    }
    .files-pinned { flex-shrink: 0; max-height: 150px; overflow-y: auto; border-bottom: 1px dashed var(--bd); margin-bottom: 2px; padding-bottom: 2px }
    .files-pinned:empty { display: none }
    .files-tree { flex: 1; overflow: auto; font-size: 12px; padding: 2px 0; min-height: 100px }
    .tree-row { display: flex; align-items: center; padding: 1px 4px; cursor: pointer; white-space: nowrap; user-select: none; min-width: max-content }
    .tree-row:hover { background: var(--bgh) }
    .tree-row[data-type="file"] { cursor: grab }
    .tree-indent { width: 10px; flex-shrink: 0 }
    .tree-toggle { width: 14px; text-align: center; flex-shrink: 0; font-size: 10px; opacity: .6 }
    .tree-icon { width: 16px; text-align: center; flex-shrink: 0; font-size: 11px }
    .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; padding-left: 2px; color: color-mix(in srgb, var(--t1) 75%, transparent) }
    .tree-copy { opacity: 0; background: none; border: none; cursor: pointer; font-size: 10px; padding: 0 2px; flex-shrink: 0 }
    .tree-row:hover .tree-copy { opacity: .6 }
    .tree-copy:hover { opacity: 1 !important }
    .tree-actions { position: sticky; right: 0; display: flex; align-items: center; margin-left: auto; flex-shrink: 0; z-index: 2; padding-left: 4px }
    .tree-row:hover .tree-actions { background: var(--bgh) }
    .sb-resize {
      height: 4px; cursor: row-resize; flex-shrink: 0;
      background: transparent; position: relative; z-index: 5;
    }
    .sb-resize:hover, .sb-resize.active { background: var(--ac); opacity: .5 }
    .file-search { padding: 4px 8px; display: flex; align-items: center; gap: 4px }
    .file-search-input { flex: 1; padding: 3px 6px; font-size: 12px; background: var(--bg); color: var(--t1); border: 1px solid var(--bd); border-radius: 4px; outline: none; min-width: 0 }
    .file-search-input:focus { border-color: var(--ac) }
    .file-search-count { font-size: 11px; color: var(--tm); white-space: nowrap; min-width: 30px; text-align: center }
    .file-search-nav { background: none; border: 1px solid var(--bd); color: var(--tm); font-size: 10px; padding: 1px 4px; cursor: pointer; border-radius: 3px }
    .file-search-nav:hover { background: var(--bgh) }
    .tree-row.search-match .tree-name { color: var(--ac); font-weight: 600 }
    .tree-row.search-focus { background: color-mix(in srgb, var(--ac) 25%, transparent); outline: 1px solid var(--ac) }
    .tree-row.search-hidden { display: none }

    .files-drop {
      margin: 6px 10px;
      padding: 10px 14px;
      border: 1.5px dashed var(--bd);
      border-radius: 6px;
      text-align: center;
      font-size: 11px;
      color: var(--tm);
      cursor: default;
      transition: all .2s
    }

    .files-drop.drag-over {
      border-color: var(--ac);
      background: rgba(57, 186, 230, .08);
      color: var(--ac)
    }

    .files-list {
      flex: 1;
      overflow-y: auto
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 4px 8px;
      padding: 7px 14px;
      cursor: pointer;
      border-left: 2px solid transparent
    }

    .file-item:hover {
      background: var(--bgh)
    }

    .file-icon {
      font-size: 11px;
      flex-shrink: 0;
      width: 14px;
      text-align: center
    }

    .file-info {
      flex: 1;
      min-width: 0
    }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--t1)
    }

    .file-path {
      font-size: 11px;
      color: var(--tm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: rtl;
      text-align: left
    }

    .file-btns {
      display: none;
      gap: 2px;
      align-items: center;
      margin-left: auto;
      flex-shrink: 0
    }

    .file-item:hover .file-btns {
      display: flex
    }

    /* Pane search bar */
    .pane-search {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      background: var(--bg2);
      border-bottom: 1px solid var(--bd);
      flex-shrink: 0
    }

    .pane-search-input {
      flex: 1;
      padding: 3px 8px;
      background: var(--bg);
      border: 1px solid var(--bd);
      border-radius: 3px;
      color: var(--t1);
      font-size: 12px;
      min-width: 60px
    }

    .pane-search-input:focus {
      outline: none;
      border-color: var(--ac)
    }

    .pane-search-count {
      font-size: 11px;
      color: var(--tm);
      white-space: nowrap;
      min-width: 20px
    }

    .pane-search-btn {
      background: none;
      border: 1px solid var(--bd);
      color: var(--tm);
      font-size: 11px;
      padding: 2px 5px;
      border-radius: 3px;
      cursor: pointer;
      line-height: 1
    }

    .pane-search-btn:hover {
      background: var(--bgh);
      color: var(--t1)
    }

    /* Editor pane */
    .pane-editor {
      flex: 1;
      overflow: hidden;
      position: relative
    }

    .pane-editor .CodeMirror {
      height: 100%;
      font-size: 13px
    }

    .pane-hd .dirty-dot {
      color: var(--yl, #e6b450);
      font-size: 16px;
      line-height: 1;
      display: none;
      position: relative;
      cursor: default
    }

    .pane-hd .dirty-dot.show {
      display: inline
    }

    .pane-hd .dirty-dot .dirty-tip {
      display: none;
      position: absolute;
      left: 50%;
      top: calc(100% + 8px);
      transform: translateX(-50%);
      width: 240px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--bg2);
      border: 1px solid var(--yl, #e6b450);
      color: var(--t1);
      font-size: 11px;
      font-weight: 400;
      line-height: 1.5;
      white-space: normal;
      z-index: 300;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .3);
      pointer-events: none
    }

    .pane-hd .dirty-dot .dirty-tip::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -5px;
      transform: translateX(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background: var(--bg2);
      border-left: 1px solid var(--yl, #e6b450);
      border-top: 1px solid var(--yl, #e6b450)
    }

    .pane-hd .dirty-dot:hover .dirty-tip {
      display: block
    }

    .pane-hd .save-btn {
      background: none;
      border: 1px solid var(--gn);
      color: var(--gn);
      font-size: 12px;
      padding: 2px 7px;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1;
      display: none
    }

    .pane-hd .save-btn.show {
      display: inline-block
    }

    .pane-hd .save-btn:hover {
      background: var(--gn);
      color: var(--bg)
    }

    .fav-area {
      border-top: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 60px;
      overflow: hidden
    }

    .fav-list {
      flex: 1;
      overflow-y: auto
    }

    .fi {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 12px;
      color: var(--t2)
    }

    .fi:hover {
      background: var(--bgh);
      color: var(--t1)
    }

    .fi .fi-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .fi .fi-del {
      display: none;
      background: none;
      border: 1px solid var(--rd);
      color: var(--rd);
      font-size: 11px;
      padding: 2px 5px;
      border-radius: 3px;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      transition: all .15s
    }

    .fi:hover .fi-del {
      display: inline-block
    }

    .fi .fi-del:hover {
      background: var(--rd);
      color: #fff
    }

    .fi .fi-rename {
      border-color: var(--ac);
      color: var(--ac)
    }

    .fi .fi-rename:hover {
      background: var(--ac);
      color: var(--bg)
    }

    /* Split tree */
    .split-area {
      flex: 1;
      overflow: hidden;
      display: flex
    }

    .split-h,
    .split-v {
      display: flex;
      width: 100%;
      height: 100%
    }

    .split-h {
      flex-direction: row
    }

    .split-v {
      flex-direction: column
    }

    .divider {
      flex-shrink: 0;
      background: var(--bd);
      z-index: 5
    }

    .divider-h {
      width: 4px;
      cursor: col-resize
    }

    .divider-h:hover,
    .divider-h.dragging {
      background: var(--ac)
    }

    .divider-v {
      height: 4px;
      cursor: row-resize
    }

    .divider-v:hover,
    .divider-v.dragging {
      background: var(--ac)
    }

    /* Leaf pane */
    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 80px;
      min-height: 60px;
      position: relative;
      border: 2px solid transparent
    }

    .pane.focused {
      border-color: var(--ac);
      border-radius: 3px
    }

    .pane-hd {
      display: flex;
      align-items: center;
      height: 26px;
      padding: 0 6px;
      background: var(--bg2);
      border-bottom: 1px solid var(--bd);
      gap: 4px;
      flex-shrink: 0
    }

    .pane-hd.focused {
      border-bottom: 2px solid var(--ac)
    }

    .pane-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--t1);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .pane-sub {
      font-size: 11px;
      color: var(--tm);
      opacity: .5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 1;
      margin-left: 6px;
    }

    .pane-btn {
      background: none;
      border: 1px solid var(--bd);
      color: var(--tm);
      font-size: 13px;
      padding: 2px 7px;
      border-radius: 4px;
      cursor: pointer;
      line-height: 1
    }

    .pane-btn:hover {
      background: var(--bgh);
      color: var(--t1)
    }

    .wrap-btn.active {
      background: var(--ac);
      color: var(--bg);
      border-color: var(--ac)
    }

    .sort-btn.active {
      background: var(--ac);
      color: var(--bg);
      border-color: var(--ac)
    }

    .sort-mode .si {
      cursor: grab
    }

    .sort-mode .si:active {
      cursor: grabbing
    }

    .sort-mode .fi {
      cursor: grab
    }

    .sort-mode .fi:active {
      cursor: grabbing
    }

    .sort-mode .si-btns {
      display: none !important
    }

    .sort-mode .fi-del {
      display: none !important
    }

    .sort-mode .fi:hover .fi-del {
      display: none !important
    }

    .drag-over-top {
      border-top: 2px solid var(--ac) !important
    }

    .drag-over-bot {
      border-bottom: 2px solid var(--ac) !important
    }

    .pane-term {
      flex: 1;
      padding: 2px;
      overflow: hidden
    }

    .pane.drop-over {
      outline: 2px solid var(--ac);
      outline-offset: -2px
    }

    .pane-recon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .5);
      z-index: 10;
      pointer-events: none
    }

    .pane-recon-inner {
      padding: 10px 20px;
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--bd);
      font-size: 12px;
      color: var(--tm);
      animation: recon-pulse 1.5s ease-in-out infinite
    }

    @keyframes recon-pulse {

      0%,
      100% {
        opacity: .6
      }

      50% {
        opacity: 1
      }
    }

    /* Presets */
    .preset-bar {
      display: flex;
      gap: 6px;
      align-items: center
    }

    .hd-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--t2);
      margin-right: 4px;
      letter-spacing: .3px
    }

    .pb {
      min-width: 28px;
      height: 22px;
      font-size: 12px;
      font-weight: 600;
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tm);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      white-space: nowrap;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .pb:hover {
      background: var(--bgh);
      color: var(--t1)
    }

    .pb.has {
      color: var(--ac);
      border-color: var(--ac)
    }

    .pb.active {
      background: var(--ac);
      color: var(--bg);
      border-color: var(--ac)
    }

    .pb-save {
      width: auto;
      padding: 0 10px;
      background: var(--bg3);
      color: var(--tm);
      font-size: 11px;
      font-weight: 600;
      margin-left: 4px
    }

    .pb-save:hover {
      background: var(--ac);
      color: var(--bg)
    }

    .pb-clear {
      width: auto;
      padding: 0 8px;
      background: none;
      border-color: var(--rd);
      color: var(--rd);
      font-size: 10px;
      margin-left: 2px
    }

    .pb-clear:hover {
      background: var(--rd);
      color: #fff
    }

    /* Layout templates */
    .hd-layout {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .hd-sep {
      width: 1px;
      height: 18px;
      background: var(--bd);
      margin: 0 8px
    }

    .lb {
      width: 28px;
      height: 22px;
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tm);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px
    }

    .lb:hover {
      background: var(--bgh);
      border-color: var(--ac)
    }

    .lb svg {
      width: 18px;
      height: 14px
    }

    .lb svg rect {

      stroke: var(--tm);
      stroke-width: .7
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      right: 20px;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none
    }

    .toast.show {
      opacity: 1;
      pointer-events: auto
    }

    .toast-ok {
      background: var(--gn);
      color: var(--bg)
    }

    .toast-err {
      background: var(--rd);
      color: #fff
    }

    .toast-undo-bar {
      position: fixed; bottom: 24px; left: 232px; top: auto; right: auto;
      transform: none; z-index: 99999;
      display: flex; align-items: center; gap: 10px;
      max-width: 420px; min-width: 240px;
      padding: 10px 16px; border-radius: 8px;
      background: var(--bg2, #1a1a2e); border: 1px solid var(--bd);

      font-size: 13px; color: var(--t1);
      opacity: 0; transition: opacity .25s; pointer-events: none;

    .toast-undo-bar.show { opacity: 1; pointer-events: auto }
    .toast-undo-bar .tu-icon { font-size: 16px; flex-shrink: 0 }

    .toast-undo-bar .tu-btn {

      padding: 4px 12px; cursor: pointer; font-size: 12px; font-weight: 600;
      white-space: nowrap; transition: opacity .15s;

    .toast-undo-bar .tu-btn:hover { opacity: .8 }

    .toast-info {
      background: var(--ac);
      color: var(--bg)
    }

    /* Rename modal */
    .rename-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 150
    }

    .rename-modal.show {
      display: flex
    }

    .rename-box {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 16px;
      width: 300px
    }

    .rename-box input {
      width: 100%;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--bd);
      border-radius: 4px;
      color: var(--t1);
      font-size: 13px;
      margin-top: 8px
    }

    .rename-box input:focus {
      outline: none;
      border-color: var(--ac)
    }

    .rename-box .mb {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px

    /* Modal */
    .ov {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);

      align-items: center;
      justify-content: center;

    .ov.sh {
      display: flex
    }

    .mo {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 8px;

    .mo h3 {
      font-size: 15px;
      margin-bottom: 14px;
      color: var(--ac)
    }

    .fg {
      margin-bottom: 10px
    }

    .fg label {

  <script>
    const A = location.origin;
    function E(n) { return encodeURIComponent(n) }
    let sessions = [], focusId = null, uid = 0;

    // ── 연결 캐시: 세션별로 term/sse를 유지. 스플릿해도 재생성 안 함 ──────────
    // conns[sessionName] = {term, fit, sse, rt, wrap(div)}
    const conns = {};
    const editors = {};
    // 세션별 상태 추적: 작업 완료(프롬프트 복귀) → pulse, permission 프롬프트 → needs-input
    const sessionState = {};
    const INPUT_PATTERNS = [/Do you want to proceed/i, /Esc to cancel/i];
    const DONE_PATTERNS = [/❯\s*$/, /^\s*❯/]; // Claude Code 프롬프트 복귀 = 작업 완료
    function updateDotState(name, state) {
      document.querySelectorAll('.si').forEach(el => {
        if (el.getAttribute('onclick')?.includes("'" + name + "'")) {
          const dot = el.querySelector('.dot'); if (!dot) return;
          dot.classList.remove('pulse', 'needs-input', 'ready', 'active');
          if (state === 'needs-input') dot.classList.add('needs-input');
          else if (state === 'pulse') dot.classList.add('pulse');
          else if (state === 'ready') dot.classList.add('ready');
          else if (state === 'active') dot.classList.add('active');
        }
      });
    }

    const WS_URL = `ws://${location.hostname}:7891`;
    function getConn(name) {
      if (conns[name]) return conns[name];
      sessionState[name] = {};
      const wrap = document.createElement('div'); wrap.style.cssText = 'width:100%;height:100%';
      const curTheme = TERM_THEMES[localStorage.getItem(THEME_KEY) || DEFAULT_THEME] || TERM_THEMES[DEFAULT_THEME];
      const savedFont = localStorage.getItem('swarm_font_family') || "'Cascadia Code','Consolas',monospace";
      const savedFontSize = parseInt(localStorage.getItem('swarm_font_size')) || 14;
      const t = new Terminal({
        cursorBlink: true, fontSize: savedFontSize, fontFamily: savedFont,
        theme: curTheme, scrollback: 2500, convertEol: true,
        scrollSensitivity: 1, fastScrollSensitivity: 5,
        fontWeight: '400', fontWeightBold: '900', drawBoldTextInBrightColors: true,
        minimumContrastRatio: 4.5
      });
      const f = new FitAddon.FitAddon(); t.loadAddon(f);
      const sa = new SearchAddon.SearchAddon(); t.loadAddon(sa);
      t.open(wrap);
      try { t.loadAddon(new WebglAddon.WebglAddon()); } catch(e) { console.warn('WebGL addon failed, using DOM renderer:', e); }
      // Ctrl+C: 선택 있으면 복사, 없으면 SIGINT 전송
      t.attachCustomKeyEventHandler(e => {
        if (e.type === 'keydown' && e.ctrlKey && e.key === 'c' && t.hasSelection()) { navigator.clipboard.writeText(t.getSelection()); t.clearSelection(); return false }
        if (e.type === 'keydown' && e.ctrlKey && e.key === 'v') { return true }
        // Ctrl+Alt → xterm 키 입력 차단 (pane 이동 모드)
        if (e.type === 'keydown' && e.ctrlKey && e.altKey) { return false }
        return true;
      });
      // 키 입력 → WebSocket 직접 전송 (지연 없음)
      t.onData(d => { if (c.ws && c.ws.readyState === 1) c.ws.send(d) });
      t.onResize(({ cols, rows }) => { fetch(A + '/sessions/' + E(name) + '/resize', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ rows, cols }) }).catch(() => { }) });
      const c = { term: t, fit: f, search: sa, wrap, ws: null, rt: null };
      // WebSocket 연결 (양방향 — 입력+출력 모두)
      function connectWS() {
        const ws = new WebSocket(WS_URL + '/ws/sessions/' + E(name)); c.ws = ws;
        ws.onmessage = e => {
          t.write(e.data);
        };
        ws.onclose = () => {
          showReconOverlay(name, true);
          c.rt = setTimeout(() => { if (conns[name]) connectWS() }, 2000)
        };
        ws.onopen = () => { showReconOverlay(name, false) };
      }
      connectWS();
      conns[name] = c;
      return c;
    }
    function destroyConn(name) {
      const c = conns[name]; if (!c) return;
      if (c.ws) c.ws.close(); if (c.rt) clearTimeout(c.rt);
      c.term.dispose(); delete conns[name]; delete sessionState[name];
    }

    // ── Split tree ──────────────────────────────────────────────────────────────
    // node: {id, type:'leaf'|'browser'|'hsplit'|'vsplit', ratio, children, session, url, el}
    let tree = null;

    function mkLeaf() { return { id: ++uid, type: 'leaf', session: null, el: null } }
    function mkBrowser(url) { return { id: ++uid, type: 'browser', url: url || 'http://localhost:3000', el: null } }

    function renderTree(node, container) {
      if (node.type === 'editor') {
        const fname = node.filePath ? node.filePath.split(/[/\\]/).pop() : '';
        const el = document.createElement('div'); el.className = 'pane'; el.style.flex = '1';
        const _dir = node.filePath ? node.filePath.replace(/\\/g, '/').split('/').slice(0, -1).join('/') : '';
        el.innerHTML = `<div class="pane-hd" id="ph-${node.id}">
      <span class="pane-name" id="pn-${node.id}" title="${esc(node.filePath || '')}">${esc(fname)}</span>${_dir ? '<span class="pane-sub" title="' + esc(_dir) + '">' + esc(_dir) + '</span>' : ''}<span style="flex:1"></span>
      <span class="dirty-dot">&#9679;<span class="dirty-tip">현재 수정 상태입니다. 이 상태에서는 agent에 의해 파일이 수정되어도 변경사항이 반영되지 않습니다. 저장 또는 Ctrl+S로 저장 후 자동 반영됩니다.</span></span>
      <button class="save-btn" onclick="saveEditor('${esc(node.filePath)}')" title="Save (Ctrl+S)">&#128190;</button>
      <button class="pane-btn" onclick="toggleEditorSearch(${node.id},'${esc(node.filePath)}')" title="Search (Ctrl+F)">&#8981;</button>
      <button class="pane-btn wrap-btn" id="wb-${node.id}" onclick="toggleWordWrap('${esc(node.filePath)}',${node.id})" title="Word Wrap (Alt+Z)">&#8629;</button>
      <button class="pane-btn" onclick="splitH(${node.id})" title="Split Right" style="font-size:11px">&#9654;</button>
      <button class="pane-btn" onclick="splitV(${node.id})" title="Split Down">&#9660;</button>
      <button class="pane-btn" onclick="unsplit(${node.id})" title="Close">&times;</button>
    </div><div class="pane-search" id="ps-${node.id}" style="display:none"><input class="pane-search-input" id="psi-${node.id}" placeholder="Search..." oninput="doEditorSearch(${node.id},'${esc(node.filePath)}')" onkeydown="if(event.key==='Enter'){event.preventDefault();doEditorSearchNav(${node.id},'${esc(node.filePath)}',event.shiftKey?'prev':'next')}if(event.key==='Escape')toggleEditorSearch(${node.id},'${esc(node.filePath)}')"><span class="pane-search-count" id="psc-${node.id}"></span><button class="pane-search-btn" onclick="doEditorSearchNav(${node.id},'${esc(node.filePath)}','prev')">&#9650;</button><button class="pane-search-btn" onclick="doEditorSearchNav(${node.id},'${esc(node.filePath)}','next')">&#9660;</button><button class="pane-search-btn" onclick="toggleEditorSearch(${node.id},'${esc(node.filePath)}')">&times;</button></div><div class="pane-editor" id="pt-${node.id}"></div>`;
        container.appendChild(el); node.el = el;
        el.addEventListener('mousedown', () => setFocus(node.id));
        setupPaneDrop(el, node.id);
        if (focusId === node.id) { el.querySelector('.pane-hd').classList.add('focused'); el.classList.add('focused'); }
        attachEditorToPane(node);
      } else if (node.type === 'leaf') {
        const el = document.createElement('div'); el.className = 'pane'; el.style.flex = '1';
        const _cmd = node._cmd || '';
        el.innerHTML = `<div class="pane-hd" id="ph-${node.id}">
      <span class="pane-name" id="pn-${node.id}">${node.session ? esc(node.session) : ''}</span>${_cmd ? '<span class="pane-sub" title="' + esc(_cmd) + '">' + esc(_cmd) + '</span>' : ''}<span style="flex:1"></span>
      <button class="pane-btn" onclick="toggleSearch(${node.id})" title="Search (Ctrl+F)">&#8981;</button>
      <button class="pane-btn" onclick="refreshNode(${node.id})" title="Refresh">&#8635;</button>
      <button class="pane-btn" onclick="splitH(${node.id})" title="Split Right" style="font-size:11px">&#9654;</button>
      <button class="pane-btn" onclick="splitV(${node.id})" title="Split Down">&#9660;</button>
      <button class="pane-btn" onclick="unsplit(${node.id})" title="Close">&times;</button>
    </div><div class="pane-search" id="ps-${node.id}" style="display:none"><input class="pane-search-input" id="psi-${node.id}" placeholder="Search..." oninput="doSearch(${node.id})" onkeydown="if(event.key==='Enter'){event.preventDefault();doSearchNav(${node.id},event.shiftKey?'prev':'next')}if(event.key==='Escape')toggleSearch(${node.id})"><span class="pane-search-count" id="psc-${node.id}"></span><button class="pane-search-btn" onclick="doSearchNav(${node.id},'prev')">&#9650;</button><button class="pane-search-btn" onclick="doSearchNav(${node.id},'next')">&#9660;</button><button class="pane-search-btn" onclick="toggleSearch(${node.id})">&times;</button></div><div class="pane-term" id="pt-${node.id}"></div>`;
        container.appendChild(el); node.el = el;
        el.addEventListener('mousedown', () => setFocus(node.id));
        setupPaneDrop(el, node.id);
        if (node.session) attachToPane(node, node.session);
        if (focusId === node.id) { el.querySelector('.pane-hd').classList.add('focused'); el.classList.add('focused'); }
      } else if (node.type === 'browser') {
        const el = document.createElement('div'); el.className = 'pane'; el.style.flex = '1';
        el.innerHTML = `<div class="pane-hd" id="ph-${node.id}">
      <input class="pane-sel" id="pu-${node.id}" value="${esc(node.url || 'http://localhost:3000')}" style="max-width:none;flex:1" placeholder="URL">
      <button class="pane-btn" onclick="refreshNode(${node.id})" title="Refresh">&#8635;</button>
      <button class="pane-btn" onclick="splitH(${node.id})" title="Split Right" style="font-size:11px">&#9654;</button>
      <button class="pane-btn" onclick="splitV(${node.id})" title="Split Down">&#9660;</button>
      <button class="pane-btn" onclick="unsplit(${node.id})" title="Close">&times;</button>
    </div><iframe id="pf-${node.id}" src="${esc(node.url || 'http://localhost:3000')}" style="flex:1;border:none;background:#fff"></iframe>`;
        container.appendChild(el); node.el = el;
        el.addEventListener('mousedown', () => setFocus(node.id));
        const inp = el.querySelector(`#pu-${node.id}`);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') { node.url = inp.value; el.querySelector('iframe').src = inp.value } });
        if (focusId === node.id) { el.querySelector('.pane-hd').classList.add('focused'); el.classList.add('focused'); }
      } else {
        const wrap = document.createElement('div');
        wrap.className = node.type === 'hsplit' ? 'split-h' : 'split-v'; wrap.style.flex = '1';
        const c1 = document.createElement('div'); c1.style.display = 'flex'; c1.style.flex = node.ratio; c1.style.overflow = 'hidden';
        const div = document.createElement('div'); div.className = node.type === 'hsplit' ? 'divider divider-h' : 'divider divider-v';
        const c2 = document.createElement('div'); c2.style.display = 'flex'; c2.style.flex = 1 - node.ratio; c2.style.overflow = 'hidden';
        wrap.appendChild(c1); wrap.appendChild(div); wrap.appendChild(c2);
        container.appendChild(wrap);
        div.addEventListener('mousedown', e => {
          e.preventDefault(); div.classList.add('dragging');
          const isH = node.type === 'hsplit'; const rect = wrap.getBoundingClientRect();
          const onMove = ev => {
            const pos = isH ? (ev.clientX - rect.left) / rect.width : (ev.clientY - rect.top) / rect.height;
            node.ratio = Math.max(0.1, Math.min(0.9, pos));

      forEachLeaf(tree, n => { if (n.session) existing.push(n.session) });

      forEachLeaf(tree, n => { if (n.session) detachFromPane(n) });
      // 레이아웃별 트리 생성
      const L = () => mkLeaf();
      if (type === '2col') {
        tree = { id: ++uid, type: 'hsplit', ratio: 0.5, children: [L(), L()] };
      } else if (type === '2t1b') {
        tree = {
          id: ++uid, type: 'vsplit', ratio: 0.5, children: [
            { id: ++uid, type: 'hsplit', ratio: 0.5, children: [L(), L()] }, L()
          ]
        };
      } else if (type === '2x2') {
        tree = {
          id: ++uid, type: 'vsplit', ratio: 0.5, children: [
            { id: ++uid, type: 'hsplit', ratio: 0.5, children: [L(), L()] },
            { id: ++uid, type: 'hsplit', ratio: 0.5, children: [L(), L()] }
          ]
        };
      } else if (type === 'big2') {
        tree = {
          id: ++uid, type: 'hsplit', ratio: 0.6, children: [

          ]
        };
      }
      // 기존 세션을 순서대로 leaf에 배치
      const leaves = []; forEachLeaf(tree, n => leaves.push(n));
      existing.forEach((name, i) => { if (i < leaves.length) leaves[i].session = name });

    function enableListReorder(containerId, itemSelector, onReorder) {
      const container = document.getElementById(containerId);
      let dragEl = null;
      container.addEventListener('dragstart', e => {
        const item = e.target.closest(itemSelector);
        if (!item || !container.contains(item)) return;
        dragEl = item; item.style.opacity = '.4';
      });
      container.addEventListener('dragend', () => {
        if (dragEl) dragEl.style.opacity = ''; dragEl = null;
        container.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(x => x.classList.remove('drag-over-top', 'drag-over-bot'));
      });
      container.addEventListener('dragover', e => {
        if (!dragEl) return;
        const item = e.target.closest(itemSelector);
        if (!item || item === dragEl || !container.contains(item)) return;
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        const rect = item.getBoundingClientRect(), mid = rect.top + rect.height / 2;
        item.classList.toggle('drag-over-top', e.clientY < mid);
        item.classList.toggle('drag-over-bot', e.clientY >= mid);
      });
      container.addEventListener('dragleave', e => {
        const item = e.target.closest(itemSelector);
        if (item) item.classList.remove('drag-over-top', 'drag-over-bot');
      });
      container.addEventListener('drop', e => {
        const item = e.target.closest(itemSelector);
        if (!item || !dragEl || dragEl === item || !container.contains(item)) return;
        e.preventDefault(); e.stopPropagation();
        item.classList.remove('drag-over-top', 'drag-over-bot');
        const rect = item.getBoundingClientRect(), mid = rect.top + rect.height / 2;
        if (e.clientY < mid) container.insertBefore(dragEl, item);
        else container.insertBefore(dragEl, item.nextSibling);
        onReorder();
      });
    }

    let tourIdx = -1;
    function startTour() { tourIdx = 0; document.getElementById('tourOv').classList.add('show'); showStep() }

    function tourPrev() { if (tourIdx > 0) { tourIdx--; showStep() } }
    function tourNext() { if (tourIdx < TOUR_STEPS.length - 1) { tourIdx++; showStep() } else endTour() }
    function showStep() {
      const step = TOUR_STEPS[tourIdx], spot = document.getElementById('tourSpot'), tip = document.getElementById('tourTip');
      const dots = TOUR_STEPS.map((_, i) => `<div class="tour-dot${i === tourIdx ? ' active' : ''}"></div>`).join('');
      const prev = tourIdx > 0 ? `<button class="tbtn" onclick="tourPrev()">← 이전</button>` : '';
      const next = tourIdx < TOUR_STEPS.length - 1 ? `<button class="tbtn tbtn-ok" onclick="tourNext()">다음 →</button>` : `<button class="tbtn tbtn-ok" onclick="endTour()">완료</button>`;
      tip.innerHTML = `<h3>${step.title}</h3>${step.body}<div class="tour-nav"><div class="tour-dots">${dots}</div><div class="tour-btns">${prev}${next}</div></div>`;
      const target = typeof step.el === 'function' ? step.el() : step.el;
      tip.style.transform = 'none';
      requestAnimationFrame(() => {
        if (target) {
          const r = target.getBoundingClientRect(), pad = 6;
          spot.style.display = 'block';
          spot.style.left = (r.left - pad) + 'px'; spot.style.top = (r.top - pad) + 'px';
          spot.style.width = (r.width + pad * 2) + 'px'; spot.style.height = (r.height + pad * 2) + 'px';
          const tipH = tip.offsetHeight, tipW = tip.offsetWidth;
          let tx, ty;
          // 대상 오른쪽에 공간이 있으면 오른쪽에, 아니면 아래에
          if (r.right + 12 + tipW <= window.innerWidth) {
            tx = r.right + 12; ty = r.top;
          } else if (r.bottom + 12 + tipH <= window.innerHeight) {
            tx = r.left; ty = r.bottom + 12;
          } else {
            tx = r.left; ty = r.top - tipH - 12;
          }
          // 화면 밖 보정
          if (ty + tipH > window.innerHeight) ty = window.innerHeight - tipH - 12;
          if (ty < 8) ty = 8;
          if (tx + tipW > window.innerWidth) tx = window.innerWidth - tipW - 16;
          if (tx < 8) tx = 8;
          tip.style.left = tx + 'px'; tip.style.top = ty + 'px';
        } else {
          spot.style.display = 'none';
          tip.style.left = Math.round((window.innerWidth - tip.offsetWidth) / 2) + 'px';
          tip.style.top = Math.round((window.innerHeight - tip.offsetHeight) / 2) + 'px';
        }
      });
    }

        if (!e.dataTransfer.types.includes('Files') && !e.dataTransfer.types.includes('text/uri-list') && !e.dataTransfer.getData('text/plain')) return;

        // 1) Text drop — IDE sidebar, address bar, or pasted path
        const textData = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text/uri-list') || '';
        if (textData && !e.dataTransfer.files.length) {
          for (let line of textData.split('\n')) {
            line = line.trim();
            if (!line || line.startsWith('#')) continue;
            // file:/// URL → path
            if (line.startsWith('file:///')) line = decodeURIComponent(line.slice(8));
            else if (line.startsWith('file://')) line = decodeURIComponent(line.slice(7));
            // Looks like a path?
            if (/^[A-Za-z]:[\\/]/.test(line) || line.startsWith('/')) {
              addFile(line);
            } else {
              // Try resolve by name
              try {
                const r = await fetch(A + '/files/resolve', {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ name: line })
                });
                const d = await r.json();
                if (d.matches && d.matches.length >= 1) { addFile(d.matches[0]); continue }
              } catch {}

                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: file.name })
