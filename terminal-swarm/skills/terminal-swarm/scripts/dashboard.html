              if (d.matches && d.matches.length === 1) { addFile(d.matches[0]); continue }
              else if (d.matches && d.matches.length > 1) {
                addFile(d.matches[0]);
                toast(file.name + ': ' + d.matches.length + ' matches, first used', 'info'); continue;
              }
            } catch {}
            toast(file.name + ' not found — use + to add by path', 'err');
          }
        }
      });
    })();

    // ── File Tree (CWD-based) ────────────────────────────────────────────────
    const _treeCache = {};
    const _treeExpanded = new Set();
    let _treeCwd = '';
    const DIR_ICONS = { dir: '\u{1F4C1}', dirOpen: '\u{1F4C2}' };

    // ── Git status ──
    let _gitStatus = { is_git: false, files: {}, dirs: {}, root: '' };
    async function _fetchGitStatus() {
      try {
        const r = await fetch(A + '/files/git-status');
        const d = await r.json();
        _gitStatus = d && d.is_git ? d : { is_git: false, files: {}, dirs: {}, root: '' };
      } catch { _gitStatus = { is_git: false, files: {}, dirs: {}, root: '' }; }
      renderFileTree(); renderFileList();
    }
    const _GIT_COLORS = { M: '#e2b93d', MM: '#e2b93d', AM: '#e2b93d', '??': '#73c991', '?': '#73c991', D: '#f07178', A: '#73c991', R: '#73c991' };
    const _GIT_LABELS = { M: 'M', MM: 'M', AM: 'M', '??': 'U', '?': 'U', D: 'D', A: 'A', R: 'R' };
    function _gitInfo(absPath, isDir) {
      if (!_gitStatus.is_git) return { color: '', badge: '' };
      if (isDir) {
        if (_gitStatus.dirs && _gitStatus.dirs[absPath]) return { color: '', badge: '<span style="font-size:10px;font-weight:600;color:#e2b93d;flex-shrink:0;padding:0 4px">\u25CF</span>' };
        return { color: '', badge: '' };
      }
      const st = _gitStatus.files && _gitStatus.files[absPath];
      if (!st) return { color: '', badge: '' };
      const c = _GIT_COLORS[st] || '#888';
      const l = _GIT_LABELS[st] || st.charAt(0);
      return { color: c, badge: '<span style="font-size:10px;font-weight:700;color:' + c + ';flex-shrink:0;padding:0 4px;letter-spacing:.5px">' + l + '</span>' };
    }

    async function initTree() {
      try {
        const r = await fetch(A + '/health');
        const d = await r.json();
        _treeCwd = (d.cwd || '').replace(/\\/g, '/');
        if (_treeCwd) { loadTreeDir(_treeCwd, 0); _fetchGitStatus(); initFilesWatch(); }
      } catch {}
    }

    // ── Files 실시간 워처 (SSE) ──
    // 서버측 watchdog이 푸시하는 변경 이벤트를 받아 해당 dir만 재조회한다.
    let _filesEvtSource = null;
    let _filesChangeTimer = null;
    let _filesReconnectTimer = null;
    let _filesBackoffMs = 3000;
    const _FILES_BACKOFF_MIN = 3000;
    const _FILES_BACKOFF_MAX = 60000;
    const _filesChangePending = { dirs: new Set(), git: false };
    function initFilesWatch() {
      if (_filesEvtSource || _filesReconnectTimer) return;
      try {
        const es = new EventSource(A + '/files/watch');
        _filesEvtSource = es;
        let gotMessage = false;
        es.onmessage = (ev) => {
          if (!gotMessage) { gotMessage = true; _filesBackoffMs = _FILES_BACKOFF_MIN; }
          try {
            const d = JSON.parse(ev.data);
            if (d.type === 'change') _handleFilesChange(d);
          } catch {}
        };
        es.onerror = () => {
          try { es.close(); } catch {}
          if (_filesEvtSource === es) _filesEvtSource = null;
          if (_filesReconnectTimer) return; // 중복 타이머 방지
          const delay = _filesBackoffMs;
          _filesBackoffMs = Math.min(_filesBackoffMs * 2, _FILES_BACKOFF_MAX);
          _filesReconnectTimer = setTimeout(() => {
            _filesReconnectTimer = null;
            initFilesWatch();
          }, delay);
        };
      } catch {}
    }
    window.addEventListener('beforeunload', () => {
      try { _filesEvtSource?.close(); } catch {}
      _filesEvtSource = null;
      if (_filesChangeTimer) { clearTimeout(_filesChangeTimer); _filesChangeTimer = null; }
      if (_filesReconnectTimer) { clearTimeout(_filesReconnectTimer); _filesReconnectTimer = null; }
    });
    function _handleFilesChange(d) {
      (d.dirs || []).forEach(x => _filesChangePending.dirs.add(x));
      if (d.git) _filesChangePending.git = true;
      if (_filesChangeTimer) return;
      // 연달아 오는 이벤트를 300ms 윈도우로 한 번 더 묶음 (git pull 등 대량 변경 대비)
      _filesChangeTimer = setTimeout(async () => {
        _filesChangeTimer = null;
        const dirs = [..._filesChangePending.dirs];
        const git = _filesChangePending.git;
        _filesChangePending.dirs.clear();
        _filesChangePending.git = false;
        // 캐시된 dir만 재조회 (보이지 않는 경로는 skip)
        const toRefetch = dirs.filter(p => _treeCache[p] !== undefined);
        await Promise.all(toRefetch.map(async p => {
          try {
            const r = await fetch(A + '/files/tree?path=' + encodeURIComponent(p));
            const j = await r.json();
            _treeCache[p] = j.entries || [];
          } catch {}
        }));
        if (toRefetch.length > 0) renderFileTree();
        if (git) _fetchGitStatus();
      }, 300);
    }
    async function loadTreeDir(dirPath, depth) {
      if (_treeCache[dirPath] && depth > 0) return _treeCache[dirPath];
      try {
        const r = await fetch(A + '/files/tree?path=' + encodeURIComponent(dirPath));
        const d = await r.json();
        _treeCache[dirPath] = d.entries || [];
        renderFileTree();
        return d.entries || [];
      } catch { return [] }
    }
    async function refreshTree() {
      const prevExpanded = new Set(_treeExpanded);
      Object.keys(_treeCache).forEach(k => delete _treeCache[k]);
      if (!_treeCwd) return;
      await loadTreeDir(_treeCwd, 0);
      _fetchGitStatus();
      // Reload previously expanded dirs in depth order so parents resolve first
      const sorted = [...prevExpanded].sort((a, b) => a.split('/').length - b.split('/').length);
      for (const dirPath of sorted) {
        // Only reload if the dir still exists in parent's cached entries
        const parent = dirPath.substring(0, dirPath.lastIndexOf('/')) || _treeCwd;
        const siblings = _treeCache[parent];
        if (siblings && siblings.some(e => e.path === dirPath && e.type === 'dir')) {
          _treeExpanded.add(dirPath);
          await loadTreeDir(dirPath, 1);
        } else {
          _treeExpanded.delete(dirPath);
        }
      }
      renderFileTree();
    }
    function renderFileTree() {
      const container = document.getElementById('files-tree');
      if (!_treeCwd || !_treeCache[_treeCwd]) { container.innerHTML = ''; return }
      container.innerHTML = buildTreeHtml(_treeCwd, 0);
    }
    function buildTreeHtml(dirPath, depth) {
      const entries = _treeCache[dirPath];
      if (!entries) return '';
      return entries.map(e => {
        const indent = '<span class="tree-indent"></span>'.repeat(depth);
        if (e.type === 'dir') {
          const expanded = _treeExpanded.has(e.path);
          const icon = expanded ? DIR_ICONS.dirOpen : DIR_ICONS.dir;
          const toggle = expanded ? '\u25BE' : '\u25B8';
          const children = expanded && _treeCache[e.path] ? buildTreeHtml(e.path, depth + 1) : '';
          const dg = _gitInfo(e.path, true);
          return '<div class="tree-row" data-type="dir" data-path="' + esc(e.path) + '" onclick="toggleTreeDir(\'' + esc(e.path) + '\')">'
            + indent + '<span class="tree-toggle">' + toggle + '</span><span class="tree-icon">' + icon + '</span>'
            + '<span class="tree-name" title="' + esc(e.path) + '">' + esc(e.name) + '</span>'
            + '<span class="tree-actions">'
            + dg.badge
            + '<button class="tree-copy" onmousedown="event.preventDefault()" onclick="event.stopPropagation();copyFilePath(\'' + esc(e.path) + '\')">&#x1F4CB;</button>'
            + '</span>'
            + '</div>' + children;
        } else {
          const ext = e.ext || e.name.split('.').pop().toLowerCase();
          const icon = fileIcon(ext);
          const fg = _gitInfo(e.path, false);
          const nameStyle = fg.color ? 'color:' + fg.color : '';
          return '<div class="tree-row" data-type="file" data-path="' + esc(e.path) + '" draggable="true" ondragstart="onFileDragStart(event,\'' + esc(e.path) + '\')" onclick="openEditor(\'' + esc(e.path) + '\')">'
            + indent + '<span class="tree-indent"></span><span class="tree-icon">' + icon + '</span>'
            + '<span class="tree-name" title="' + esc(e.path) + '"' + (nameStyle ? ' style="' + nameStyle + '"' : '') + '>' + esc(e.name) + '</span>'
            + '<span class="tree-actions">'
            + fg.badge
            + '<button class="tree-copy" onclick="event.stopPropagation();addFile(\'' + esc(e.path) + '\')" title="Pin">&#x1F4CC;</button>'
            + '<button class="tree-copy" onmousedown="event.preventDefault()" onclick="event.stopPropagation();copyFilePath(\'' + esc(e.path) + '\')" title="Copy path">&#x1F4CB;</button>'
            + '</span>'
            + '</div>';
        }
      }).join('');
    }
    async function toggleTreeDir(dirPath) {
      if (_treeExpanded.has(dirPath)) {
        _treeExpanded.delete(dirPath);
      } else {
        _treeExpanded.add(dirPath);
        if (!_treeCache[dirPath]) await loadTreeDir(dirPath, 1);
      }
      renderFileTree();
    }
    renderFileList();
    initTree();

    // ── Sidebar section resize ──────────────────────────────────────────────────
    const SB_LAYOUT_KEY = 'swarm_sb_layout';
    (function() {
      document.querySelectorAll('.sb-resize').forEach(handle => {
        handle.addEventListener('mousedown', e => {
          e.preventDefault();
          const aboveId = handle.dataset.above;
          const belowId = handle.dataset.below;
          const above = document.getElementById(aboveId);
          const below = document.getElementById(belowId);
          if (!above || !below) return;
          handle.classList.add('active');
          const startY = e.clientY;
          const startAboveH = above.offsetHeight;
          const startBelowH = below.offsetHeight;
          const total = startAboveH + startBelowH;
          const onMove = ev => {
            const dy = ev.clientY - startY;
            const minH = 28;
            const newAbove = Math.max(minH, Math.min(total - minH, startAboveH + dy));
            const newBelow = total - newAbove;
            // flex 비율로 설정 (합계 보존)
            above.style.flex = newAbove + ' 0 0px';
            below.style.flex = newBelow + ' 0 0px';
          };
          const onUp = () => {
            handle.classList.remove('active');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            _saveSbLayout();
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      });
      _loadSbLayout();
    })();
    function _saveSbLayout() {
      const layout = {};
      document.querySelectorAll('.sb-section').forEach(el => {
        if (el.id) layout[el.id] = el.offsetHeight;
      });
      localStorage.setItem(SB_LAYOUT_KEY, JSON.stringify(layout));
    }
    function _loadSbLayout() {
      try {
        const layout = JSON.parse(localStorage.getItem(SB_LAYOUT_KEY));
        if (!layout) return;
        // 비율 기반으로 flex 설정
        Object.entries(layout).forEach(([id, h]) => {
          const el = document.getElementById(id);
          if (el) el.style.flex = h + ' 0 0px';
        });
      } catch {}
    }
    function _getSbLayout() {
      const layout = {};
      document.querySelectorAll('.sb-section').forEach(el => {
        if (el.id) layout[el.id] = el.offsetHeight;
      });
      return layout;
    }
    function _setSbLayout(layout) {
      if (!layout) return;
      Object.entries(layout).forEach(([id, h]) => {
        const el = document.getElementById(id);
        if (el) el.style.flex = h + ' 0 0px';
      });
    }

    // ── File search (independent result list) ─────────────────────────────────
    let _fsMatches = [];  // array of {path, name, relPath} objects
    let _fsIdx = -1;
    let _fsActive = false;
    function _showSearchResults(show) {
      _fsActive = show;
      document.getElementById('files-tree').style.display = show ? 'none' : '';
      document.getElementById('files-search-results').style.display = show ? '' : 'none';
    }
    function toggleFileSearch() {
      const bar = document.getElementById('file-search');
      const visible = bar.style.display !== 'none';
      bar.style.display = visible ? 'none' : 'flex';
      if (!visible) {
        const inp = document.getElementById('file-search-input');
        inp.value = ''; inp.focus();
        _clearFileSearch();
      } else {
        _clearFileSearch();
      }
    }
    function _clearFileSearch() {
      _fsMatches = []; _fsIdx = -1;
      document.getElementById('file-search-count').textContent = '';
      _showSearchResults(false);
      document.querySelector('#files-search-results .file-search-results').innerHTML = '';
    }
    let _fsTimer = null;
    function onFileSearch(q) {
      _clearFileSearch();
      if (q.length < 2) return;
      clearTimeout(_fsTimer);
      _fsTimer = setTimeout(() => _fileSearchServer(q.toLowerCase()), 250);
    }
    async function _fileSearchServer(lq) {
      try {
        const r = await fetch(A + '/files/search?q=' + encodeURIComponent(lq));
        const d = await r.json();
        if (!d.results || !d.results.length) {
          document.getElementById('file-search-count').textContent = 'no match';
          _showSearchResults(true);
          document.querySelector('#files-search-results .file-search-results').innerHTML = '<div style="padding:12px;color:var(--tm);text-align:center;font-size:12px">No results</div>';
          return;
        }
        const cwdPrefix = _treeCwd ? _treeCwd.replace(/\\/g, '/') + '/' : '';
        _fsMatches = d.results.map(f => {
          const p = f.path.replace(/\\/g, '/');
          const name = p.split('/').pop();
          let relPath = p;
          if (cwdPrefix && p.startsWith(cwdPrefix)) relPath = p.slice(cwdPrefix.length);
          // relPath의 파일명 부분 제거 → 디렉토리만
          const dirPart = relPath.includes('/') ? relPath.replace(/\/[^/]*$/, '') : '.';
          return { path: p, name, relPath: dirPart };
        });
        _showSearchResults(true);
        // 결과 리스트 렌더링
        const container = document.querySelector('#files-search-results .file-search-results');
        container.innerHTML = _fsMatches.map((f, i) => {
          const ext = f.name.split('.').pop().toLowerCase();
          const icon = fileIcon(ext);
          const fg = _gitInfo(f.path, false);
          const nameStyle = fg.color ? 'color:' + fg.color + ';' : '';
          return '<div class="tree-row search-match" data-type="file" data-path="' + esc(f.path) + '" data-idx="' + i + '" draggable="true" ondragstart="onFileDragStart(event,\'' + esc(f.path) + '\')" onclick="openEditor(\'' + esc(f.path) + '\')" style="display:flex;flex-wrap:wrap;padding:3px 4px;gap:0">'
            + '<span style="width:100%;display:flex;align-items:center">'
              + '<span class="tree-icon" style="flex-shrink:0">' + icon + '</span>'
              + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;' + nameStyle + '">' + esc(f.name) + '</span>'
              + fg.badge
              + '<button class="tree-copy" onclick="event.stopPropagation();addFile(\'' + esc(f.path) + '\')" title="Pin">&#x1F4CC;</button>'
              + '<button class="tree-copy" onmousedown="event.preventDefault()" onclick="event.stopPropagation();copyFilePath(\'' + esc(f.path) + '\')" title="Copy path">&#x1F4CB;</button>'
            + '</span>'
            + '<span style="width:100%;font-size:10px;color:var(--tm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:18px">' + esc(f.relPath) + '</span>'
            + '</div>';
        }).join('');
        const countEl = document.getElementById('file-search-count');
        countEl.textContent = _fsMatches.length + ' found';
        if (_fsMatches.length) { _fsIdx = 0; _focusFileSearchMatch(); }
      } catch { document.getElementById('file-search-count').textContent = 'error'; }
    }
    function _focusFileSearchMatch() {
      document.querySelectorAll('#files-search-results .search-focus').forEach(el => el.classList.remove('search-focus'));
      if (_fsIdx < 0 || _fsIdx >= _fsMatches.length) return;
      const container = document.querySelector('#files-search-results .file-search-results');
      const rows = container.querySelectorAll('.tree-row');
      const row = rows[_fsIdx];
      if (row) {
        row.classList.add('search-focus');
        row.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
      document.getElementById('file-search-count').textContent = (_fsIdx + 1) + '/' + _fsMatches.length;
    }
    function fileSearchNav(dir) {
      if (!_fsMatches.length) return;
      if (dir === 'next') _fsIdx = (_fsIdx + 1) % _fsMatches.length;
      else _fsIdx = (_fsIdx - 1 + _fsMatches.length) % _fsMatches.length;
      _focusFileSearchMatch();
    }
    function fileSearchKey(e) {
      if (e.key === 'Escape') { toggleFileSearch(); return }
      if (e.key === 'ArrowDown' || (e.key === 'Enter' && !e.shiftKey)) { e.preventDefault(); fileSearchNav('next'); return }
      if (e.key === 'ArrowUp' || (e.key === 'Enter' && e.shiftKey)) { e.preventDefault(); fileSearchNav('prev'); return }
    }

    // ── Editor pane ─────────────────────────────────────────────────────────────
    // editors[filePath] = {cm, wrap, dirty, originalContent}
    const CM_MODES = {
      js: ['javascript', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js'],
      jsx: ['jsx', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/jsx/jsx.min.js'],
      ts: ['javascript', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js'],
      tsx: ['jsx', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/jsx/jsx.min.js'],
      py: ['python', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.min.js'],
      html: ['htmlmixed', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js'],
      css: ['css', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js'],
      json: ['javascript', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js'],
      md: ['markdown', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.min.js'],
      yml: ['yaml', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/yaml/yaml.min.js'],
      yaml: ['yaml', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/yaml/yaml.min.js'],
      sh: ['shell', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/shell/shell.min.js'],
      bash: ['shell', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/shell/shell.min.js'],
      xml: ['xml', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js'],
      sql: ['sql', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/sql/sql.min.js'],
      toml: ['toml', 'https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/toml/toml.min.js'],
    };
    const _loadedModes = new Set();
    async function loadCMMode(ext) {
      const m = CM_MODES[ext]; if (!m) return '';
      const [mode, url] = m;
      if (!_loadedModes.has(mode)) {
        // xml is needed for htmlmixed
        if (mode === 'htmlmixed' && !_loadedModes.has('xml')) {
          await _loadScript('https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js');
          await _loadScript('https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js');
          await _loadScript('https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js');
          _loadedModes.add('xml'); _loadedModes.add('javascript'); _loadedModes.add('css');
        }
        await _loadScript(url);
        _loadedModes.add(mode);
      }
      return mode;
    }
    function _loadScript(url) {
      return new Promise((res, rej) => {
        if (document.querySelector(`script[src="${url}"]`)) { res(); return }
        const s = document.createElement('script'); s.src = url; s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    function mkEditor(filePath) { return { id: ++uid, type: 'editor', filePath, el: null } }

    function getEditorConn(filePath) {
      if (editors[filePath]) return editors[filePath];
      const wrap = document.createElement('div'); wrap.style.cssText = 'width:100%;height:100%';
      const ec = { cm: null, wrap, dirty: false, originalContent: '', filePath };
      editors[filePath] = ec;
      return ec;
    }

    async function openEditor(filePath) {
      // 이미 에디터 pane에 열려있으면 포커스 이동
      let existing = null;
      forEachLeaf(tree, n => { if (n.type === 'editor' && n.filePath === filePath) existing = n });
      if (existing) { setFocus(existing.id); return }
      // 포커스된 pane을 에디터로 변환, 또는 빈 leaf 찾기
      if (!focusId && tree) focusId = getFirstLeaf(tree).id;
      const node = findNode(tree, focusId);
      if (!node) return;
      // leaf나 browser pane을 에디터로 전환
      if (node.type === 'leaf') detachFromPane(node);
      node.type = 'editor'; node.filePath = filePath;
      delete node.session; delete node.url;
      rebuildUI();
    }

    async function attachEditorToPane(node) {
      const ec = getEditorConn(node.filePath);
      const termEl = node.el?.querySelector('.pane-editor'); if (!termEl) return;
      termEl.innerHTML = ''; termEl.appendChild(ec.wrap);
      if (!ec.cm) {
        // load file content
        try {
          const r = await fetch(A + '/files/read?path=' + encodeURIComponent(node.filePath));
          const d = await r.json();
          if (d.error) { toast(d.error, 'err'); return }
          ec.originalContent = d.content;
        } catch (e) { toast('File read failed', 'err'); return }
        const ext = node.filePath.split('.').pop().toLowerCase();
        const mode = await loadCMMode(ext);
        ec.cm = CodeMirror(ec.wrap, {
          value: ec.originalContent,
          mode: mode || '',
          theme: 'swarm',
          lineNumbers: true,
          lineWrapping: false,
          indentUnit: 2,
          tabSize: 2,
          indentWithTabs: false,
          dragDrop: false,
          extraKeys: { 'Ctrl-S': () => saveEditor(node.filePath), 'Ctrl-F': false, 'Ctrl-G': false, 'Shift-Ctrl-F': false, 'Shift-Ctrl-R': false, 'Ctrl-H': false }
        });
        ec.cm.on('changes', () => {
          const dirty = ec.cm.getValue() !== ec.originalContent;
          ec.dirty = dirty;
          updateEditorDirty(node.filePath);
        });
      }
      setTimeout(() => { if (ec.cm) ec.cm.refresh() }, 30);
    }

    function updateEditorDirty(filePath) {
      const ec = editors[filePath]; if (!ec) return;
      // 현재 tree에서 해당 파일이 열린 pane을 찾아서 UI 갱신
      let node = null;
      forEachLeaf(tree, n => { if (n.type === 'editor' && n.filePath === filePath) node = n });
      if (!node) return;
      const dot = node.el?.querySelector('.dirty-dot');
      const btn = node.el?.querySelector('.save-btn');
      if (dot) dot.classList.toggle('show', ec.dirty);
      if (btn) btn.classList.toggle('show', ec.dirty);
      // Files 탭의 dirty 표시도 갱신
      const fileDot = document.querySelector(`.file-dirty[data-path="${CSS.escape(filePath)}"]`);
      if (fileDot) fileDot.style.display = ec.dirty ? '' : 'none';
    }

    // ── Pane search (terminal) ──────────────────────────────────────────────────
    function toggleSearch(nodeId) {
      const bar = document.getElementById('ps-' + nodeId);
      if (!bar) return;
      const visible = bar.style.display !== 'none';
      bar.style.display = visible ? 'none' : 'flex';
      if (!visible) {
        const inp = document.getElementById('psi-' + nodeId);
        if (inp) { inp.focus(); inp.select() }
      } else {
        // 검색 해제
        const node = findNode(tree, nodeId);
        if (node?.session && conns[node.session]) conns[node.session].search.clearDecorations();
      }
    }
    function doSearch(nodeId) {
      const node = findNode(tree, nodeId);
      if (!node?.session || !conns[node.session]) return;
      const q = document.getElementById('psi-' + nodeId)?.value || '';
      const c = conns[node.session];
      if (!q) { c.search.clearDecorations(); document.getElementById('psc-' + nodeId).textContent = ''; return }
      c.search.findNext(q);
    }
    function doSearchNav(nodeId, dir) {
      const node = findNode(tree, nodeId);
      if (!node?.session || !conns[node.session]) return;
      const q = document.getElementById('psi-' + nodeId)?.value || '';
      if (!q) return;
      const c = conns[node.session];
      if (dir === 'next') c.search.findNext(q);
      else c.search.findPrevious(q);
    }

    // ── Pane search (editor — uses CodeMirror built-in) ─────────────────────────
    function toggleEditorSearch(nodeId, filePath) {
      const bar = document.getElementById('ps-' + nodeId);
      if (!bar) return;
      const visible = bar.style.display !== 'none';
      bar.style.display = visible ? 'none' : 'flex';
      if (!visible) {
        const inp = document.getElementById('psi-' + nodeId);
        if (inp) { inp.focus(); inp.select() }
      } else {
        // 검색 하이라이트 해제
        const ec = editors[filePath]; if (ec?._searchOverlay) { ec.cm.removeOverlay(ec._searchOverlay); ec._searchOverlay = null }
        document.getElementById('psc-' + nodeId).textContent = '';
      }
    }
    function doEditorSearch(nodeId, filePath) {
      const ec = editors[filePath]; if (!ec?.cm) return;
      const q = document.getElementById('psi-' + nodeId)?.value || '';
      // 기존 overlay 제거
      if (ec._searchOverlay) { ec.cm.removeOverlay(ec._searchOverlay); ec._searchOverlay = null }
      if (!q) { document.getElementById('psc-' + nodeId).textContent = ''; ec._searchMatches = []; ec._searchIdx = -1; return }
      // 매칭 위치 수집
      const matches = []; const cursor = ec.cm.getSearchCursor(q, null, true);
      while (cursor.findNext()) matches.push({ from: cursor.from(), to: cursor.to() });
      ec._searchMatches = matches; ec._searchIdx = -1;
      document.getElementById('psc-' + nodeId).textContent = matches.length ? matches.length + ' found' : 'no match';
      // 하이라이트 overlay
      ec._searchOverlay = { token: function(stream) { const remaining = stream.string.slice(stream.pos); const idx = remaining.toLowerCase().indexOf(q.toLowerCase()); if (idx === 0) { stream.pos += q.length; return 'searching' } else if (idx > 0) { stream.pos += idx } else { stream.skipToEnd() } return null } };
      ec.cm.addOverlay(ec._searchOverlay);
      if (matches.length) doEditorSearchNav(nodeId, filePath, 'next');
    }
    function doEditorSearchNav(nodeId, filePath, dir) {
      const ec = editors[filePath]; if (!ec?.cm || !ec._searchMatches?.length) return;
      if (dir === 'next') ec._searchIdx = (ec._searchIdx + 1) % ec._searchMatches.length;
      else ec._searchIdx = (ec._searchIdx - 1 + ec._searchMatches.length) % ec._searchMatches.length;
      const m = ec._searchMatches[ec._searchIdx];
      ec.cm.setSelection(m.from, m.to); ec.cm.scrollIntoView(m.from, 100);
      document.getElementById('psc-' + nodeId).textContent = (ec._searchIdx + 1) + '/' + ec._searchMatches.length;
    }

    // Ctrl+F → search in focused pane
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'f') {
        const node = focusId ? findNode(tree, focusId) : null;
        if (!node) return;
        if (node.type === 'leaf' && node.session) { e.preventDefault(); toggleSearch(node.id) }
        else if (node.type === 'editor' && node.filePath) { e.preventDefault(); toggleEditorSearch(node.id, node.filePath) }
      }
    });

    function toggleWordWrap(filePath, nodeId) {
      const ec = editors[filePath]; if (!ec || !ec.cm) return;
      const cur = ec.cm.getOption('lineWrapping');
      ec.cm.setOption('lineWrapping', !cur);
      const btn = document.getElementById('wb-' + nodeId);
      if (btn) btn.classList.toggle('active', !cur);
    }

    // Alt+Z → toggle word wrap on focused editor pane
    document.addEventListener('keydown', e => {
      if (e.altKey && e.key === 'z') {
        e.preventDefault();
        const node = focusId ? findNode(tree, focusId) : null;
        if (node && node.type === 'editor' && node.filePath) {
          toggleWordWrap(node.filePath, node.id);
        }
      }
    });

    // Alt+Shift+Arrow → pane focus 이동 (방향 기반)
    function movePaneFocus(dir) {
      const leaves = [];
      forEachLeaf(tree, n => {
        if (!n.el) return;
        const r = n.el.getBoundingClientRect();
        leaves.push({ id: n.id, cx: r.left + r.width / 2, cy: r.top + r.height / 2 });
      });
      if (leaves.length < 2) return;
      const cur = leaves.find(l => l.id === focusId);
      if (!cur) return;
      let best = null, bestDist = Infinity;
      for (const l of leaves) {
        if (l.id === cur.id) continue;
        const dx = l.cx - cur.cx, dy = l.cy - cur.cy;
        let ok = false;
        if (dir === 'ArrowLeft' && dx < -10) ok = true;
        else if (dir === 'ArrowRight' && dx > 10) ok = true;
        else if (dir === 'ArrowUp' && dy < -10) ok = true;
        else if (dir === 'ArrowDown' && dy > 10) ok = true;
        if (!ok) continue;
        const primary = dir === 'ArrowLeft' || dir === 'ArrowRight' ? Math.abs(dx) : Math.abs(dy);
        const cross = dir === 'ArrowLeft' || dir === 'ArrowRight' ? Math.abs(dy) : Math.abs(dx);
        const dist = primary + cross * 2;
        if (dist < bestDist) { bestDist = dist; best = l; }
      }
      if (best) setFocus(best.id);
    }
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.altKey && e.key.startsWith('Arrow')) { e.preventDefault(); e.stopPropagation(); movePaneFocus(e.key); }
      // Ctrl+Home/End: 터미널 스크롤 최상단/최하단
      if (e.ctrlKey && (e.key === 'Home' || e.key === 'End')) {
        const node = focusId ? findNode(tree, focusId) : null;
        if (node && node.type === 'leaf' && node.session && conns[node.session]) {
          e.preventDefault(); e.stopPropagation();
          if (e.key === 'Home') conns[node.session].term.scrollToTop();
          else conns[node.session].term.scrollToBottom();
        }
        return;
      }
      // Home/End 키: 포커싱된 터미널 pane에 전달 (브라우저 기본 동작 차단)
      if (e.key === 'Home' || e.key === 'End') {
        const node = focusId ? findNode(tree, focusId) : null;
        if (node && node.type === 'leaf' && node.session && conns[node.session]) {
          e.preventDefault(); e.stopPropagation();
          const seq = e.key === 'Home' ? '\x1b[H' : '\x1b[F';
          conns[node.session].term.focus();
          if (conns[node.session].ws && conns[node.session].ws.readyState === 1) {
            conns[node.session].ws.send(seq);
          }
        }
      }
    }, true);

    async function saveEditor(filePath) {
      const ec = editors[filePath]; if (!ec || !ec.cm) return;
      const content = ec.cm.getValue();
      try {
        const r = await fetch(A + '/files/write', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: filePath, content }) });
        const d = await r.json();
        if (d.error) { toast(d.error, 'err'); return }
        ec.originalContent = content; ec.dirty = false;
        // update all editor panes showing this file
        updateEditorDirty(filePath);
        toast('Saved', 'ok');
      } catch (e) { toast('Save failed', 'err') }
    }

    // ── File watching (외부 변경 자동 감지) ─────────────────────────────────────
    setInterval(async () => {
      for (const [filePath, ec] of Object.entries(editors)) {
        if (!ec.cm || ec.dirty) continue;
        try {
          const r = await fetch(A + '/files/read?path=' + encodeURIComponent(filePath));
          const d = await r.json();
          if (d.content != null && d.content !== ec.originalContent) {
            ec.originalContent = d.content;
            const cursor = ec.cm.getCursor();
            const scroll = ec.cm.getScrollInfo();
            ec.cm.setValue(d.content);
            ec.cm.setCursor(cursor);
            ec.cm.scrollTo(scroll.left, scroll.top);
          }
        } catch {}
      }
    }, 2000);

    // ── Init ────────────────────────────────────────────────────────────────────
    tree = mkLeaf(); focusId = tree.id; rebuildUI(); fetchPresetsFromServer().then(() => renderPresetBtns()); ld();
    // 세션 수 기반 적응형 폴링: 0-4 → 1s, 5-9 → 2s, 10+ → 3s
    let _pollInterval = null;
    function _adaptivePoll() {
      const n = sessions.length;
      const ms = n >= 10 ? 3000 : n >= 5 ? 2000 : 1000;
      if (_pollInterval && _pollInterval._ms === ms) return;
      if (_pollInterval) clearInterval(_pollInterval);
      _pollInterval = setInterval(ld, ms);
      _pollInterval._ms = ms;
    }
    _adaptivePoll(); setInterval(_adaptivePoll, 5000);
    // 리스트 드래그 정렬 (이벤트 위임 — 한 번만 등록)
    enableListReorder('sl', '.si', () => {
      setSessOrder([...document.querySelectorAll('#sl .si')].map(el => el.dataset.name));
    });
    enableListReorder('files-list', '.file-item', () => {
      const items = [...document.querySelectorAll('#files-list .file-item')];
      const files = getFileReg(), nf = [];
      items.forEach(el => { const idx = parseInt(el.dataset.idx); if (files[idx]) nf.push(files[idx]) });
      setFileReg(nf); renderFileList();
    });
    enableListReorder('fav-list', '.fi', () => {
      const items = [...document.querySelectorAll('#fav-list .fi')];
      const favs = getFavs(), nf = [];
      items.forEach(el => { const idx = parseInt(el.dataset.idx); if (favs[idx]) nf.push(favs[idx]) });
      setFavs(nf); renderFavs();
      fetch(A + '/quicklaunch', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(nf) }).catch(() => {});
    });
  </script>
</body>
